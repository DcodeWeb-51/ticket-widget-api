<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="widget.css">
</head>

<body>

<button id="openWidget">Support</button>

<div id="widgetBox">

<h3>Support Ticket</h3>

<form id="ticketForm">

<input name="your-name" placeholder="Name" required>

<input name="your-email" placeholder="Email" required>

<select name="issue-type">
<option value="Registration">Registration</option>
<option value="Payment">Payment</option>
<option value="Course Related">Course Related</option>
</select>

<input name="your-subject" placeholder="Subject">

<textarea name="your-message" placeholder="Message"></textarea>

<button type="submit">Send</button>

</form>

</div>

<script src="widget.js"></script>

</body>
</html>
